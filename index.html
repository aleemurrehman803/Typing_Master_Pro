<html lang="en">

<head>

    content="typing test, WPM test, typing speed, typing certification, learn typing, typing practice, keyboard training" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4f46e5" />

  <!-- Mobile Optimized -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

</head>

<body>
  <!-- Root Element for React Application -->
  <div id="root"></div>

  <!-- DEBUG: Global Error Handler -->
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      document.body.innerHTML = '<div style="color:red; background:white; font-size:16px; padding:20px; z-index:9999; position:fixed; top:0; left:0; width:100%; height:100%; overflow:auto;">' +
        '<h1>⚠️ APPLICATION CRASH</h1>' +
        '<p><strong>Error:</strong> ' + message + '</p>' +
        '<p><strong>Location:</strong> ' + source + ':' + lineno + '</p>' +
        '<pre style="background:#eee; padding:10px; border:1px solid #ccc;">' + (error?.stack || 'No stack trace') + '</pre>' +
        '</div>';
      console.error("GLOBAL CRASH CAUGHT:", error);
    };
  </script>

  <!-- Main Entry Point Script -->
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
