<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Meta Tags -->
  <title>TypeMaster Pro | Advanced Typing Platform & Certification</title>
  <meta name="description"
    content="Boost your typing speed and accuracy with TypeMaster Pro. Advanced analytics, 24/7 practice arena, and professional typing certifications." />
  <meta name="keywords"
    content="typing test, WPM, speed typing, touch typing, typing certificate, TypeMaster Pro" />
  <meta name="author" content="TypeMaster Pro" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="TypeMaster Pro - Master the Art of Typing" />
  <meta property="og:description" content="Professional typing platform with real-time analytics and global rankings." />
  <meta property="og:image" content="./og-image.png" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#6366f1" />

  <!-- Mobile Optimized -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- Security: Content Security Policy (Production) -->
  <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; 
               script-src 'self'; 
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
               img-src 'self' data: https:; 
               font-src 'self' data: https://fonts.gstatic.com; 
               connect-src 'self' https://*.supabase.co https://*.supabase.in https://worldtimeapi.org; 
               frame-ancestors 'none'; 
               base-uri 'self'; 
               form-action 'self';" />
</head>

<body>
  <div id="root"></div>

  <!-- Main Entry Point -->
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
